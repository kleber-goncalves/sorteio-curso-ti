<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsivo.css">
    <title>Sorteio do Mario KG</title>
</head>
<body>
    <main class="container">
        <aside class="decoracoes" aria-hidden="true">
            <div class="nuvem nuvem--superior-esquerda"></div>
            <div class="nuvem nuvem--superior-direita"></div>
            <div class="nuvem nuvem--inferior-esquerda"></div>
            <div class="decoracao decoracao--moeda"></div>
            <div class="decoracao decoracao--cogumelo"></div>
            <div class="decoracao decoracao--estrela"></div>
        </aside>

        <header class="cabecalho">
            <h1 class="titulo">SORTEIO</h1>
            <p class="subtitulo">Gire a roleta do Mario!</p>
        </header>

        <section class="centro-meio" aria-label="centro-meio de sorteio">
            <div class="aura-mario">
                <img class="imagem-mario" src="./img/1.png" alt="Mario com uma roleta de sorteio" width="320" height="320">
            </div>

            <section class="cartao-resultado" aria-label="Resultado do sorteio">
                <div class="cartao-resultado__rotulo">RESULTADO</div>
                <div class="cartao-resultado__valor" id="resultado" aria-live="polite">?</div>
            </section>

            <section class="caixa-controles" aria-label="Controles do sorteio">
                <div class="intervalo" role="group" aria-label="Intervalo do sorteio">
                    <label class="campo">
                        <span class="campo__rotulo">MÍN</span>
                        <input class="campo__entrada" id="minimo" type="number" inputmode="numeric" step="1" value="1">
                    </label>
                    <label class="campo">
                        <span class="campo__rotulo">MÁX</span>
                        <input class="campo__entrada" id="maximo" type="number" inputmode="numeric" step="1" value="100">
                    </label>
                </div>

                <div class="acoes" aria-label="Ações">
                    <button class="botao botao--comecar" id="comecar" type="button">
                        <span class="botao__icone" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" focusable="false" aria-hidden="true">
                                <path d="M8 5v14l12-7-12-7Z" fill="currentColor"></path>
                            </svg>
                        </span>
                        <span class="botao__texto">COMEÇAR</span>
                    </button>

                    <button class="botao botao--parar" id="parar" type="button" disabled>
                        <span class="botao__icone" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" focusable="false" aria-hidden="true">
                                <path d="M7 7h10v10H7z" fill="currentColor"></path>
                            </svg>
                        </span>
                        <span class="botao__texto">PARAR</span>
                    </button>

                    <button class="botao botao--resetar" id="resetar" type="button">
                        <span class="botao__icone" aria-hidden="true">
                            <svg viewBox="0 0 24 24" width="18" height="18" focusable="false" aria-hidden="true">
                                <path d="M12 6a6 6 0 1 1-5.35 3.3" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"></path>
                                <path d="M5 6v5h5" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </span>
                        <span class="botao__texto">RESETAR</span>
                    </button>
                </div>
            </section>

            <p class="dica" id="dica" aria-live="polite"></p>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
